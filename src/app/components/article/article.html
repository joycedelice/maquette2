<article class="fw-bold text-align-center text-white justify-content-center d-flex align-items-center"
    style="width: 100%; height: 100%; background-color: rgb(11, 86, 98);border: 2px solid orange;">
    <div class="d-flex flex-column align-items-center">
        <p>ARTICLE</p>
        
        <div class="d-flex">
            <div class="mt-3" >
                <button (click)="incrementCount()" class="btn btn-success ">+</button>
                <button (click)="decrementCount()" class="btn btn-danger me-2">-</button>
                
            </div>
            
        </div>
        <h1 [ngClass]="{
            'text-danger':count<0,
            'text-success':count>0,
            'text-secondary':count===0
        }">

                @if (count<0) {
                    <p class="text-danger">{{ count }}</p>
                } @else if (count>0) {
                    <p class="text-success">{{ count }}</p>
                } @else {
                    <p class="text-secondary">{{ count }}</p>
                }
                
            
        </h1>
    </div>
</article>
