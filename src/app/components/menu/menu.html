@if (isDisplayBox) {
<div class="d-flex flex-column align-items-end w-100 px-3">
    <button (click)="toggleBox()" class="btn btn-danger my-3" >Toggle Menu</button>
    <ul class="d-flex  flex-md-rowjustify-content-md-end list-unstyled gap-3 mb-0 w-100 text-end" >

        @for (item of Liens; track item; let first=$first) {
        @if (first) {
            <li>
                <a class="text-decoration-none text-white" href="#">
                    <span [class.active]="isActive" class=" text-danger"> {{item}}</span>
                </a>
            </li>
        } @else {
           <li><a class="text-decoration-none text-white" href="#">{{item}}</a></li>
        }

        }
    </ul>
</div>

}@else {
    <div class="d-flex flex-column align-items-end w-100 px-3">
    <button (click)="toggleBox()" class="btn btn-success my-3">Toggle Menu </button>
</div>
}
